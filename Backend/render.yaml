services:
  - type: web
    name: bg-writing-assistant
    env: python
    buildCommand: pip install -r Backend/requirements.txt
    startCommand: uvicorn Backend.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: OPENAI_API_KEY
        sync: false
      - key: OPENAI_MODEL
        value: gpt-4.1-mini
